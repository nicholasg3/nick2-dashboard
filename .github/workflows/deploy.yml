name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'logs/**'
      - 'reports/**'
      - 'scripts/**'
      - 'memos/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Reconcile ledger, memos, reports
        run: |
          python3 scripts/reconcile-ledger.py
          python3 scripts/generate-memos.py
          python3 scripts/export-json-reports.py

      - name: Assemble site
        run: |
          mkdir -p _site/logs _site/reports _site/memos
          cp dashboard/index.html dashboard/app.js dashboard/style.css dashboard/memo.html _site/
          cp logs/ceo-ledger.jsonl _site/logs/
          cp -r memos/. _site/memos/ 2>/dev/null || true
          cp reports/*.json _site/reports/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4